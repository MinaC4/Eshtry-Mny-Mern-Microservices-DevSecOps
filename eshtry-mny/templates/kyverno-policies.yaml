apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-security-standards
spec:
  validationFailureAction: Enforce
  rules:
    - name: require-non-root
      match:
        any:
          - resources:
              kinds: ["Pod"]
      validate:
        message: "runAsNonRoot must be true"
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
    - name: require-readonly-rootfs
      match:
        any:
          - resources:
              kinds: ["Pod"]
      validate:
        message: "readOnlyRootFilesystem must be true"
        pattern:
          spec:
            containers:
              - securityContext:
                  readOnlyRootFilesystem: true
    - name: require-resources
      match:
        any:
          - resources:
              kinds: ["Pod"]
      validate:
        message: "CPU/memory requests and limits required"
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    cpu: "?*"
                    memory: "?*"
                  limits:
                    cpu: "?*"
                    memory: "?*"
    - name: deny-latest-tag
      match:
        any:
          - resources:
              kinds: ["Pod"]
      validate:
        message: "Image tag 'latest' not allowed"
        deny:
          conditions:
            all:
              - key: "{{ container.image }}"
                operator: EndsWith
                value: ":latest"
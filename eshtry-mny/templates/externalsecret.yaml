apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: eshtry-mny-secrets
  namespace: eshtry-mny
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
    - secretKey: MONGO_USERNAME
      remoteRef:
        key: /eshtry-mny/prod/mongodb
        property: username
    - secretKey: MONGO_PASSWORD
      remoteRef:
        key: /eshtry-mny/prod/mongodb
        property: password
    - secretKey: ACCESS_TOKEN
      remoteRef:
        key: /eshtry-mny/prod/jwt
        property: access_token